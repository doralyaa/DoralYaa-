<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoraYaa! Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_admin.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <aside class="sidebar-admin">
        <div class="brand">
            <img src="logo.png" alt="DoraYaa Logo" class="logo">
            <h2>DoraYaa! Admin</h2>
        </div>
        <nav class="nav-menu">
            <a href="#" class="nav-link active"><i data-lucide="layout-dashboard"></i> Panel</a>
            <a href="#" class="nav-link"><i data-lucide="shopping-bag"></i> Pedidos</a>
            <a href="#" class="nav-link"><i data-lucide="users"></i> Clientes</a>
            <a href="#" class="nav-link"><i data-lucide="settings"></i> Ajustes</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1>Panel de Control</h1>
            <div class="user-profile">
                <span>Administrador</span>
                <div class="avatar">A</div>
            </div>
        </header>

        <section class="dashboard-stats">
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--accent-orange); color: var(--primary);">
                    <i data-lucide="shopping-cart"></i>
                </div>
                <div class="stat-info">
                    <h3>Pedidos Hoy</h3>
                    <p id="stat-orders-today">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--accent-green); color: #2E7D32;">
                    <i data-lucide="dollar-sign"></i>
                </div>
                <div class="stat-info">
                    <h3>Ingresos Hoy</h3>
                    <p id="stat-revenue-today">$0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #E3F2FD; color: #1565C0;">
                    <i data-lucide="calendar"></i>
                </div>
                <div class="stat-info">
                    <h3>Pedidos Mes</h3>
                    <p id="stat-orders-month">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #E8F5E9; color: #2E7D32;">
                    <i data-lucide="trending-up"></i>
                </div>
                <div class="stat-info">
                    <h3>Ingresos Mes</h3>
                    <p id="stat-revenue-month">$0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--accent-blue); color: #1565C0;">
                    <i data-lucide="clock"></i>
                </div>
                <div class="stat-info">
                    <h3>Pendientes</h3>
                    <p id="stat-pending">0</p>
                </div>
            </div>
        </section>

        <section class="recent-orders">
            <div class="section-header">
                <h2>Pedidos en Tiempo Real</h2>
                <button class="refresh-btn" onclick="loadOrders()"><i data-lucide="refresh-cw"></i> Actualizar</button>
            </div>

            <div class="orders-table-container">
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Hora</th>
                            <th>Cliente</th>
                            <th>Artículos</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body">
                        <!-- Dynamically populated -->
                    </tbody>
                </table>
                <div id="no-orders" class="no-data" style="display: none;">
                    <i data-lucide="inbox" size="48"></i>
                    <p>No hay pedidos recientes</p>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app_admin.js"></script>
    <script>setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 500);</script>
</body>

</html>
